[project]
name = "nano-gpt"
version = "0.1.0"
description = "Build GPT from scratch"
readme = "README.md"
requires-python = ">=3.14.6"
dependencies = ["numpy>=2.4.6", "torch>=2.12.1"]

[project.scripts]
nano-gpt = "nano_gpt:main"

[[tool.uv.index]]
url = "https://pypi.tuna.tsinghua.edu.cn/simple/"
default = true

[build-system]
requires = ["uv_build>=0.11.23,<0.12.0"]
build-backend = "uv_build"
