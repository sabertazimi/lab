[project]
name = "agent-cli"
version = "0.1.0"
description = "Minimal Claude Code with rich tools, task planning, subagent orchestration, and skill system support."
readme = "README.md"
authors = [{ name = "sabertazimi", email = "sabertazimi@gmail.com" }]
requires-python = ">=3.14.5"
dependencies = [
  "anthropic>=0.96.0",
  "ddgs>=9.14.0",
  "httpx>=0.28.1",
  "langchain>=1.2.15",
  "langchain-openai>=1.1.14",
  "langgraph>=1.2.0",
  "markdownify>=1.2.2",
  "pydantic>=2.13.2",
  "python-dotenv>=1.2.2",
  "rich>=15.0.0",
  "textual>=8.2.7",
  "textual-autocomplete>=4.0.6",
]

[project.scripts]
agent-cli = "agent_cli:main"
ac = "agent_cli:main"

[[tool.uv.index]]
url = "https://pypi.tuna.tsinghua.edu.cn/simple/"
default = true

[build-system]
requires = ["uv_build>=0.11.15,<0.12.0"]
build-backend = "uv_build"
