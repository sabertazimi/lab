[project]
name = "agent-cli"
version = "0.1.0"
description = "Minimal Claude Code with rich tools, task planning, subagent orchestration, and skill system support."
readme = "README.md"
authors = [ { name = "sabertazimi", email = "sabertazimi@gmail.com" } ]
requires-python = ">=3.14.3"
dependencies = [
  "anthropic>=0.86.0",
  "ddgs>=9.11.4",
  "httpx>=0.28.1",
  "langchain>=1.2.15",
  "langchain-openai>=1.1.12",
  "langgraph>=1.1.6",
  "markdownify>=1.2.2",
  "pydantic>=2.12.5",
  "python-dotenv>=1.2.2",
  "rich>=14.3.3",
  "textual>=8.1.1",
  "textual-autocomplete>=4.0.6",
]

[project.scripts]
agent-cli = "agent_cli:main"
ac = "agent_cli:main"

[[tool.uv.index]]
url = "https://mirrors.aliyun.com/pypi/simple/"
default = true

[build-system]
requires = [ "uv_build>=0.11.3,<0.12.0" ]
build-backend = "uv_build"
